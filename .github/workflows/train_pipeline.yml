name: Train Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "tests/**"
      - "notebooks/**"
      - "data/**"
      - "api/**"
      - "pyproject.toml"
      - ".github/workflows/train_pipeline.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "notebooks/**"
      - "data/**"
      - "api/**"
      - "pyproject.toml"
      - ".github/workflows/train_pipeline.yml"
  workflow_dispatch:

jobs:
  test-and-train:
    runs-on: ubuntu-latest

    env:
      APP_ENV: ci
      DEBUG: "false"
      LOG_LEVEL: INFO
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_WORKERS: 1
      VNSTOCK_API_KEY: dummy_key_for_ci
      DATA_DIR: data
      RAW_DATA_DIR: data/raw
      PROCESSED_DATA_DIR: data/processed
      ARTIFACTS_DIR: data/artifacts
      MODEL_DIR: data/artifacts/models
      REPORT_DIR: data/artifacts/reports
      RANDOM_STATE: 42
      TARGET_COL: Fraud
      TRAIN_END_YEAR: 2021
      VALID_YEAR: 2022
      TEST_YEAR: 2023
      TOP_K_FEATURES: 12
      BATCH_SIZE: 2
      SLEEP_PER_SYMBOL: 0
      SLEEP_PER_BATCH: 0
      DEFAULT_SOURCE: VCI
      MLFLOW_TRACKING_URI: http://127.0.0.1:5000
      MLFLOW_EXPERIMENT_NAME: financial_fraud_detection
      MLFLOW_RUN_NAME: ci_run
      BEST_MODEL_FILENAME: best_model.joblib
      SCALER_FILENAME: scaler.joblib
      FEATURES_FILENAME: feature_cols.joblib
      TZ: Asia/Bangkok

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Create required directories
        run: |
          mkdir -p data/raw
          mkdir -p data/processed
          mkdir -p data/artifacts/models
          mkdir -p data/artifacts/reports

      - name: Run unit tests
        run: pytest tests -q

      - name: Create synthetic model dataset for CI
        run: |
          python - <<'PY'
          import numpy as np
          import pandas as pd
          from pathlib import Path

          rng = np.random.default_rng(42)
          rows = []
          years = [2019, 2020, 2021, 2022, 2023]

          for cp in ["AAA", "BBB", "CCC", "DDD", "EEE", "FFF"]:
              for year in years:
                  rows.append({
                      "CP": cp,
                      "Năm": year,
                      "DSRI": float(rng.normal(1.0, 0.1)),
                      "GMI": float(rng.normal(1.0, 0.1)),
                      "AQI": float(rng.normal(1.0, 0.1)),
                      "SGI": float(rng.normal(1.1, 0.15)),
                      "DEPI": float(rng.normal(1.0, 0.1)),
                      "SGAI": float(rng.normal(1.0, 0.1)),
                      "LVGI": float(rng.normal(1.0, 0.1)),
                      "TATA": float(rng.normal(0.0, 0.05)),
                      "RSST_Accruals": float(rng.normal(0.0, 0.05)),
                      "Delta_Receivables": float(rng.normal(0.0, 0.03)),
                      "Delta_Inventory": float(rng.normal(0.0, 0.03)),
                      "Delta_Cash_Sales": float(rng.normal(0.0, 0.10)),
                      "Fraud": int(rng.uniform() > 0.7),
                  })

          df = pd.DataFrame(rows)
          output_path = Path("data/processed/model_data.xlsx")
          output_path.parent.mkdir(parents=True, exist_ok=True)
          df.to_excel(output_path, index=False)
          print(f"Saved synthetic dataset to: {output_path}")
          print(df.head())
          PY

      - name: Run training pipeline
        run: |
          python - <<'PY'
          from src.pipeline import run_training_pipeline
          artifacts = run_training_pipeline("data/processed/model_data.xlsx")
          print("Best model:", artifacts["best_model_name"])
          print(artifacts["test_summary"])
          PY

      - name: Verify model artifacts
        run: |
          test -f data/artifacts/models/best_model.joblib
          test -f data/artifacts/models/scaler.joblib
          test -f data/artifacts/models/feature_cols.joblib

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-artifacts
          path: data/artifacts/models/